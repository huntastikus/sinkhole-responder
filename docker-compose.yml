services:
  sinkhole-responder:
    image: ${SINKHOLE_IMAGE:-huntastikus/sinkhole-responder:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${SINKHOLE_BUILD_VERSION:-docker}
    ports:
      - "${SINKHOLE_DATA_BIND_ADDRESS:-0.0.0.0}:${SINKHOLE_HTTP_PORT:-80}:${SINKHOLE_HTTP_PORT:-80}"
      - "${SINKHOLE_DATA_BIND_ADDRESS:-0.0.0.0}:${SINKHOLE_HTTPS_PORT:-443}:${SINKHOLE_HTTPS_PORT:-443}"
      - "${SINKHOLE_ADMIN_BIND_ADDRESS:-0.0.0.0}:${SINKHOLE_ADMIN_HTTP_PORT:-8080}:${SINKHOLE_ADMIN_HTTP_PORT:-8080}"
      - "${SINKHOLE_ADMIN_BIND_ADDRESS:-0.0.0.0}:${SINKHOLE_ADMIN_HTTPS_PORT:-8443}:${SINKHOLE_ADMIN_HTTPS_PORT:-8443}"
      # Management is reachable from this host only unless this bind address is
      # deliberately changed. Never expose health or metrics to untrusted networks.
      - "${SINKHOLE_MANAGEMENT_BIND_ADDRESS:-127.0.0.1}:${SINKHOLE_MANAGEMENT_PORT:-9090}:${SINKHOLE_MANAGEMENT_PORT:-9090}"
    command: ["--config", "/data/config.yaml"]
    environment:
      # Listener addresses are derived from the container-port parameters above.
      SINKHOLE_LISTEN_HTTP: "0.0.0.0:${SINKHOLE_HTTP_PORT:-80}"
      SINKHOLE_LISTEN_HTTPS: "0.0.0.0:${SINKHOLE_HTTPS_PORT:-443}"
      SINKHOLE_STATE_DIR: /data
      SINKHOLE_ADMIN_ENABLED: ${SINKHOLE_ADMIN_ENABLED:-true}
      SINKHOLE_ADMIN_LISTEN: "0.0.0.0:${SINKHOLE_ADMIN_HTTP_PORT:-8080}"
      SINKHOLE_ADMIN_TLS_ENABLED: ${SINKHOLE_ADMIN_TLS_ENABLED:-true}
      SINKHOLE_ADMIN_TLS_LISTEN: "0.0.0.0:${SINKHOLE_ADMIN_HTTPS_PORT:-8443}"
      SINKHOLE_MANAGEMENT_ENABLED: ${SINKHOLE_MANAGEMENT_ENABLED:-true}
      SINKHOLE_MANAGEMENT_LISTEN: "0.0.0.0:${SINKHOLE_MANAGEMENT_PORT:-9090}"
      # The container-side listener must be non-loopback for Docker publication;
      # the host-side mapping above remains loopback-only by default.
      SINKHOLE_MANAGEMENT_ALLOW_EXTERNAL: "true"

      # Optional binary overrides are imported from the Compose environment only
      # when defined. See .env.example and README.md for types and defaults.
      SINKHOLE_ADMIN_PASSWORD:
      SINKHOLE_ADMIN_PASSWORD_FILE:
      SINKHOLE_ADMIN_TLS_CERT_FILE:
      SINKHOLE_ADMIN_TLS_KEY_FILE:
      SINKHOLE_ADMIN_TLS_REDIRECT_HTTP:
      SINKHOLE_ADMIN_SESSION_TTL:
      SINKHOLE_ADMIN_LOGIN_RATE_PER_IP:
      SINKHOLE_ADMIN_LOGIN_BURST:
      SINKHOLE_TLS_MODE:
      SINKHOLE_TLS_CERT_FILE:
      SINKHOLE_TLS_KEY_FILE:
      SINKHOLE_TLS_HOSTS:
      SINKHOLE_CA_CERT_FILE:
      SINKHOLE_CA_KEY_FILE:
      SINKHOLE_CA_CACHE_SIZE:
      SINKHOLE_CA_LEAF_TTL:
      SINKHOLE_RULEPACKS:
      SINKHOLE_DEFAULTS_STATUS:
      SINKHOLE_DEFAULTS_BEACON_STATUS:
      SINKHOLE_DEFAULTS_MEDIA_RESPONSE:
      SINKHOLE_DEFAULTS_CACHE_CONTROL:
      SINKHOLE_MAX_HEADER_BYTES:
      SINKHOLE_MAX_BODY_BYTES:
      SINKHOLE_READ_TIMEOUT:
      SINKHOLE_WRITE_TIMEOUT:
      SINKHOLE_IDLE_TIMEOUT:
      SINKHOLE_RATE_PER_IP:
      SINKHOLE_RATE_BURST:
      SINKHOLE_LOG_LEVEL:
      SINKHOLE_ACCESS_LOG:
      SINKHOLE_LOG_QUERY:
      SINKHOLE_LOG_POST_BODY:
      SINKHOLE_POST_BODY_LOG_MAX_BYTES:
      SINKHOLE_ANONYMIZE_CLIENT:
      SINKHOLE_JSONP_ENABLED:
      SINKHOLE_JSONP_PARAM:
    read_only: true
    cap_drop:
      - ALL
    # Required only when a selected container port is below 1024.
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    user: "${SINKHOLE_UID:-65532}:${SINKHOLE_GID:-65532}"
    volumes:
      # Writable configuration and GUI-managed state.
      - ${SINKHOLE_DATA_DIR:-./data}:/data
      # Optional operator-provided CA and TLS material. Keep private keys read-only.
      - ${SINKHOLE_CERTS_DIR:-./certs}:/certs:ro
      # Optional secret files, including an admin-password file.
      - ${SINKHOLE_SECRETS_DIR:-./secrets}:/run/secrets:ro
    restart: ${SINKHOLE_RESTART_POLICY:-unless-stopped}

    # The scratch image has no shell or curl. Monitor the loopback-published
    # management endpoint from the host: http://127.0.0.1:9090/healthz.
